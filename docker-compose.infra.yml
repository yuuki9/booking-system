# Local infrastructure only (PostgreSQL, Redis, Kafka).
# Run the app on the host with ./gradlew bootRun or your IDE.
#
#   docker compose -f docker-compose.infra.yml up -d
#   KAFKA_BOOTSTRAP_SERVERS=localhost:9094 ./gradlew bootRun
#
# See .env.local for default environment variables.

x-kafka-common: &kafka-common
  image: bitnami/kafka:3.7
  restart: unless-stopped

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: booking_system
      POSTGRES_USER: lab
      POSTGRES_PASSWORD: lab
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lab -d booking_system"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./scripts/db/init-payment-db.sh:/docker-entrypoint-initdb.d/init-payment-db.sh:ro

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"

  kafka:
    <<: *kafka-common
    environment:
      KAFKA_CFG_NODE_ID: 0
      KAFKA_CFG_PROCESS_ROLES: controller,broker
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 0@kafka:9093
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      # INTERNAL: container-to-container (full-stack compose)
      # EXTERNAL: host bootRun / IDE → localhost:9094
      KAFKA_CFG_LISTENERS: INTERNAL://:9092,EXTERNAL://:9094,CONTROLLER://:9093
      KAFKA_CFG_ADVERTISED_LISTENERS: INTERNAL://kafka:9092,EXTERNAL://localhost:9094
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CFG_INTER_BROKER_LISTENER_NAME: INTERNAL
    ports:
      - "9092:9092"
      - "9094:9094"

volumes:
  postgres-data:
