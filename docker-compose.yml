x-app-env: &app-env
  SPRING_PROFILES_ACTIVE: api
  APP_MODE: standard
  DB_HOST: postgres
  DB_PORT: 5432
  DB_NAME: booking_system
  DB_USER: lab
  DB_PASSWORD: lab
  REDIS_HOST: redis
  REDIS_PORT: 6379
  KAFKA_BOOTSTRAP_SERVERS: kafka:9092

x-app-depends: &app-depends
  postgres:
    condition: service_healthy
  redis:
    condition: service_started
  kafka:
    condition: service_started

x-app-build: &app-build
  context: .
  args:
    MODULE: reservation-service

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: booking_system
      POSTGRES_USER: lab
      POSTGRES_PASSWORD: lab
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lab -d booking_system"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  kafka:
    image: bitnami/kafka:3.7
    environment:
      KAFKA_CFG_NODE_ID: 0
      KAFKA_CFG_PROCESS_ROLES: controller,broker
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 0@kafka:9093
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
    ports:
      - "9092:9092"

  app:
    build: *app-build
    environment:
      <<: *app-env
      LOCK_STRATEGY: OPTIMISTIC
      SERVER_PORT: 8080
    depends_on:
      <<: *app-depends
    ports:
      - "8080:8080"
    profiles:
      - single

  app-1:
    build: *app-build
    environment:
      <<: *app-env
      LOCK_STRATEGY: REDIS
      SERVER_PORT: 8080
    depends_on:
      <<: *app-depends
    profiles:
      - scale3

  app-2:
    build: *app-build
    environment:
      <<: *app-env
      LOCK_STRATEGY: REDIS
      SERVER_PORT: 8080
    depends_on:
      <<: *app-depends
    profiles:
      - scale3

  app-3:
    build: *app-build
    environment:
      <<: *app-env
      LOCK_STRATEGY: REDIS
      SERVER_PORT: 8080
    depends_on:
      <<: *app-depends
    profiles:
      - scale3

  nginx:
    image: nginx:1.27-alpine
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"
    depends_on:
      - app-1
      - app-2
      - app-3
    profiles:
      - scale3

  reservation-consumer:
    build: *app-build
    command: ["java", "-jar", "app.jar", "--spring.profiles.active=consumer"]
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: booking_system
      DB_USER: lab
      DB_PASSWORD: lab
      REDIS_HOST: redis
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    depends_on:
      <<: *app-depends

  k6:
    image: grafana/k6:latest
    volumes:
      - ./scripts/k6:/scripts
    profiles:
      - k6
